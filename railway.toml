[build]
builder = "nixpacks"
buildCommand = "npm install && cd dashboard && npm install && npm run build"

[deploy]
startCommand = "npx tsx bot-with-dashboard.ts"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5

[variables]
NODE_VERSION = "20"
